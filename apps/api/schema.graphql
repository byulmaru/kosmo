type Account implements Node {
  id: ID!
  name: String!
  profiles: [Profile!]!
}

type AccountProfile implements Node {
  id: ID!
  role: AccountProfileRole!
}

enum AccountProfileRole {
  ADMIN
  MEMBER
  OWNER
}

enum AccountState {
  ACTIVE
  DISABLED
  SUSPENDED
}

type ConflictError implements Error & FieldError {
  code: String!
  field: String
  message: String!
}

input CreatePostInput {
  content: TipTapDocument!
  visibility: PostVisibility!
}

union CreatePostResult = CreatePostSuccess

type CreatePostSuccess {
  post: Post!
}

input CreateProfileInput {
  handle: String!
}

union CreateProfileResult = ConflictError | CreateProfileSuccess

type CreateProfileSuccess {
  profile: Profile!
}

"""RFC9557 formatted string"""
scalar DateTime

input DeleteProfileInput {
  id: ID!
}

union DeleteProfileResult = DeleteProfileSuccess | NotFoundError | PermissionDeniedError

type DeleteProfileSuccess {
  profileId: ID!
}

interface Error {
  code: String!
  message: String!
}

interface FieldError implements Error {
  code: String!
  field: String
  message: String!
}

input FollowProfileInput {
  id: ID!
}

union FollowProfileResult = ConflictError | FollowProfileSuccess | NotFoundError

type FollowProfileSuccess {
  profileFollow: ProfileFollow!
}

interface ForbiddenError implements Error {
  code: String!
  message: String!
}

type Mutation {
  createPost(input: CreatePostInput!): CreatePostResult!
  createProfile(input: CreateProfileInput!): CreateProfileResult!
  deleteProfile(input: DeleteProfileInput!): DeleteProfileResult!
  followProfile(input: FollowProfileInput!): FollowProfileResult!
  selectProfile(input: SelectProfileInput!): SelectProfileResult!
  unfollowProfile(input: UnfollowProfileInput!): UnfollowProfileResult!
  updateProfile(input: UpdateProfileInput!): UpdateProfileResult!
}

interface Node {
  id: ID!
}

type NotFoundError implements Error {
  code: String!
  message: String!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type PermissionDeniedError implements Error & ForbiddenError {
  code: String!
  message: String!
}

type Post implements Node {
  content: PostContent
  createdAt: DateTime!
  id: ID!
  profile: Profile!
  state: PostState!
  visibility: PostVisibility!
}

type PostContent implements Node {
  bodyJson: TipTapDocument!
  bodyText: String!
  createdAt: DateTime!
  id: ID!
  spoilerText: String
}

enum PostState {
  ACTIVE
  DELETED
}

enum PostVisibility {
  DIRECT
  FOLLOWERS
  PUBLIC
  UNLISTED
}

type Profile implements Node {
  bio: String
  createdAt: DateTime!
  displayName: String!
  followPolicy: ProfileFollowPolicy!
  followers(after: String, before: String, first: Int, last: Int): ProfileFollowersConnection!
  followersCount: Int!
  following(after: String, before: String, first: Int, last: Int): ProfileFollowingConnection!
  followingCount: Int!
  handle: String!
  id: ID!
  posts(after: String, before: String, first: Int, last: Int): ProfilePostsConnection!
  viewerFollow: ProfileFollow
}

type ProfileFollow implements Node {
  createdAt: DateTime!
  followee: Profile
  follower: Profile
  id: ID!
  state: ProfileFollowState!
}

enum ProfileFollowPolicy {
  APPROVAL_REQUIRED
  OPEN
}

enum ProfileFollowState {
  ACCEPTED
  PENDING
  REJECTED
}

type ProfileFollowersConnection {
  edges: [ProfileFollowersConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileFollowersConnectionEdge {
  cursor: String!
  node: ProfileFollow!
}

type ProfileFollowingConnection {
  edges: [ProfileFollowingConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileFollowingConnectionEdge {
  cursor: String!
  node: ProfileFollow!
}

type ProfilePostsConnection {
  edges: [ProfilePostsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfilePostsConnectionEdge {
  cursor: String!
  node: Post!
}

enum ProfileState {
  ACTIVE
  DISABLED
  SUSPENDED
}

type Query {
  currentSession: Session
  me: Account
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  post(id: ID!): Post
  profileByHandle(handle: String!): Profile
}

input SelectProfileInput {
  id: ID!
}

union SelectProfileResult = NotFoundError | SelectProfileSuccess

type SelectProfileSuccess {
  profile: Profile!
}

type Session implements Node {
  account: Account!
  id: ID!
  selectedProfile: Profile
}

"""TipTap JSON document"""
scalar TipTapDocument

input UnfollowProfileInput {
  id: ID!
}

union UnfollowProfileResult = NotFoundError | UnfollowProfileSuccess

type UnfollowProfileSuccess {
  profileFollowId: ID
}

input UpdateProfileInput {
  bio: String
  displayName: String
  followPolicy: ProfileFollowPolicy
  id: ID!
}

union UpdateProfileResult = NotFoundError | PermissionDeniedError | UpdateProfileSuccess

type UpdateProfileSuccess {
  profile: Profile!
}

type ValidationError implements Error & FieldError {
  code: String!
  field: String
  message: String!
}
