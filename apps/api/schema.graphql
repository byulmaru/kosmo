type Account implements Node {
  id: ID!
  name: String!
  profiles: [Profile!]!
}

type AccountProfile implements Node {
  id: ID!
  role: AccountProfileRole!
}

enum AccountProfileRole {
  ADMIN
  MEMBER
  OWNER
}

enum AccountState {
  ACTIVE
  DISABLED
  SUSPENDED
}

input AddReactionInput {
  postId: ID!
  type: String!
}

type AddReactionPayload {
  reaction: Reaction!
}

input ApproveProfileFollowRequestInput {
  id: ID!
}

type ApproveProfileFollowRequestPayload {
  followeeProfile: Profile!
  followerProfile: Profile!
  profileFollow: ProfileFollow!
  profileFollowRequestId: ID!
}

type Bookmark implements Node {
  createdAt: DateTime!
  id: ID!
  post: Post
  profile: Profile!
}

type BookmarkConnection {
  edges: [BookmarkConnectionEdge!]!
  pageInfo: PageInfo!
}

type BookmarkConnectionEdge {
  cursor: String!
  node: Bookmark!
}

input CancelProfileFollowRequestInput {
  id: ID!
}

type CancelProfileFollowRequestPayload {
  followerProfile: Profile!
  profileFollowRequestId: ID!
}

input CreateBookmarkInput {
  postId: ID!
}

type CreateBookmarkPayload {
  bookmark: Bookmark!
}

input CreatePostInput {
  bodyText: String!
  visibility: PostVisibility!
}

type CreatePostPayload {
  post: Post!
}

input CreateProfileInput {
  handle: String!
}

type CreateProfilePayload {
  account: Account!
  profile: Profile!
}

"""RFC9557 formatted string"""
scalar DateTime

input DeleteBookmarkInput {
  id: ID!
}

type DeleteBookmarkPayload {
  bookmarkId: ID
  post: Post
}

input DeleteProfileInput {
  id: ID!
}

type DeleteProfilePayload {
  profileId: ID!
}

input DeleteReactionInput {
  id: ID!
}

type DeleteReactionPayload {
  reactionId: ID!
}

input ExchangeNativeOidcSessionInput {
  code: String!
  codeVerifier: String!
  redirectUri: String!
}

type ExchangeNativeOidcSessionPayload {
  token: String!
}

type FollowNotification implements Node & Notification {
  createdAt: DateTime!
  id: ID!
  profile: Profile!
  readAt: DateTime
}

input FollowProfileInput {
  id: ID!
}

type FollowProfilePayload {
  followeeProfile: Profile!
  followerProfile: Profile!
  result: ProfileFollowResult!
}

enum InstanceKind {
  ACTIVITYPUB
  LOCAL
}

input MarkNotificationReadInput {
  id: ID!
}

type MarkNotificationReadPayload {
  notification: Notification!
  recipientProfile: Profile!
}

type Mutation {
  addReaction(input: AddReactionInput!): AddReactionPayload!
  approveProfileFollowRequest(input: ApproveProfileFollowRequestInput!): ApproveProfileFollowRequestPayload!
  cancelProfileFollowRequest(input: CancelProfileFollowRequestInput!): CancelProfileFollowRequestPayload!
  createBookmark(input: CreateBookmarkInput!): CreateBookmarkPayload!
  createPost(input: CreatePostInput!): CreatePostPayload!
  createProfile(input: CreateProfileInput!): CreateProfilePayload!
  deleteBookmark(input: DeleteBookmarkInput!): DeleteBookmarkPayload!
  deleteProfile(input: DeleteProfileInput!): DeleteProfilePayload!
  deleteReaction(input: DeleteReactionInput!): DeleteReactionPayload!
  exchangeNativeOidcSession(input: ExchangeNativeOidcSessionInput!): ExchangeNativeOidcSessionPayload!
  followProfile(input: FollowProfileInput!): FollowProfilePayload!
  markNotificationRead(input: MarkNotificationReadInput!): MarkNotificationReadPayload!
  rejectProfileFollowRequest(input: RejectProfileFollowRequestInput!): RejectProfileFollowRequestPayload!
  selectProfile(input: SelectProfileInput!): SelectProfilePayload!
  unfollowProfile(input: UnfollowProfileInput!): UnfollowProfilePayload!
  updateProfile(input: UpdateProfileInput!): UpdateProfilePayload!
}

interface Node {
  id: ID!
}

interface Notification implements Node {
  createdAt: DateTime!
  id: ID!
  readAt: DateTime
}

type NotificationConnection {
  edges: [NotificationConnectionEdge!]!
  pageInfo: PageInfo!
}

type NotificationConnectionEdge {
  cursor: String!
  node: Notification!
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

type Post implements Node {
  content: PostContent
  createdAt: DateTime!
  id: ID!
  profile: Profile!
  state: PostState!
  visibility: PostVisibility!
}

type PostConnection {
  edges: [PostConnectionEdge!]!
  pageInfo: PageInfo!
}

type PostConnectionEdge {
  cursor: String!
  node: Post!
}

type PostContent implements Node {
  bodyText: String!
  contentWarning: String
  createdAt: DateTime!
  document: PostContentDocument!
  id: ID!
}

"""Kosmo versioned PostContent document JSON"""
scalar PostContentDocument

enum PostState {
  ACTIVE
  DELETED
}

enum PostVisibility {
  DIRECT
  FOLLOWERS
  PUBLIC
  UNLISTED
}

type Profile implements Node {
  bio: String
  bookmarks(after: String, before: String, first: Int, last: Int): BookmarkConnection!
  createdAt: DateTime!
  displayName: String!
  followPolicy: ProfileFollowPolicy!
  followers(after: String, before: String, first: Int, last: Int): ProfileFollowersConnection!
  followersCount: Int!
  following(after: String, before: String, first: Int, last: Int): ProfileFollowingConnection!
  followingCount: Int!
  handle: String!
  id: ID!
  incomingProfileFollowRequests(after: String, before: String, first: Int, last: Int): ProfileIncomingProfileFollowRequestsConnection
  instance: ProfileInstance!
  notifications(after: String, before: String, first: Int, last: Int): NotificationConnection!
  outgoingProfileFollowRequests(after: String, before: String, first: Int, last: Int): ProfileOutgoingProfileFollowRequestsConnection
  posts(after: String, before: String, first: Int, last: Int): PostConnection!
  relativeHandle: String!
  unreadNotificationCount: Int!
  viewerState: ProfileViewerState
}

type ProfileFollow implements Node {
  createdAt: DateTime!
  followee: Profile
  follower: Profile
  id: ID!
}

enum ProfileFollowPolicy {
  APPROVAL_REQUIRED
  OPEN
}

type ProfileFollowRequest implements Node {
  createdAt: DateTime!
  followee: Profile
  follower: Profile
  id: ID!
}

union ProfileFollowResult = ProfileFollow | ProfileFollowRequest

type ProfileFollowersConnection {
  edges: [ProfileFollowersConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileFollowersConnectionEdge {
  cursor: String!
  node: ProfileFollow!
}

type ProfileFollowingConnection {
  edges: [ProfileFollowingConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileFollowingConnectionEdge {
  cursor: String!
  node: ProfileFollow!
}

type ProfileIncomingProfileFollowRequestsConnection {
  edges: [ProfileIncomingProfileFollowRequestsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileIncomingProfileFollowRequestsConnectionEdge {
  cursor: String!
  node: ProfileFollowRequest!
}

type ProfileInstance {
  kind: InstanceKind!
}

type ProfileOutgoingProfileFollowRequestsConnection {
  edges: [ProfileOutgoingProfileFollowRequestsConnectionEdge!]!
  pageInfo: PageInfo!
}

type ProfileOutgoingProfileFollowRequestsConnectionEdge {
  cursor: String!
  node: ProfileFollowRequest!
}

enum ProfileState {
  ACTIVE
  DISABLED
  SUSPENDED
}

type ProfileViewerState {
  follow: ProfileFollow
  followRequest: ProfileFollowRequest
  isSelf: Boolean!
}

type Query {
  currentSession: Session
  homeTimeline(after: String, before: String, first: Int, last: Int): PostConnection
  me: Account
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  profileByHandle(handle: String!): Profile
}

type Reaction implements Node {
  createdAt: DateTime!
  id: ID!
  type: String!
}

input RejectProfileFollowRequestInput {
  id: ID!
}

type RejectProfileFollowRequestPayload {
  followeeProfile: Profile!
  profileFollowRequestId: ID!
}

input SelectProfileInput {
  id: ID!
}

type SelectProfilePayload {
  profile: Profile!
  session: Session!
}

type Session implements Node {
  account: Account!
  id: ID!
  selectedProfile: Profile
}

input UnfollowProfileInput {
  id: ID!
}

type UnfollowProfilePayload {
  followeeProfile: Profile
  followerProfile: Profile!
  profileFollowId: ID
}

input UpdateProfileInput {
  bio: String
  displayName: String
  followPolicy: ProfileFollowPolicy
  id: ID!
}

type UpdateProfilePayload {
  profile: Profile!
}
