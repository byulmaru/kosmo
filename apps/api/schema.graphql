type Account implements Node {
  id: ID!
  name: String!
}

type AccountProfile implements Node {
  id: ID!
  role: AccountProfileRole
}

enum AccountProfileRole {
  ADMIN
  MEMBER
  OWNER
}

enum AccountState {
  ACTIVE
  DISABLED
  SUSPENDED
}

"""RFC9557 formatted string"""
scalar DateTime

interface Node {
  id: ID!
}

type Profile implements Node {
  bio: String
  createdAt: DateTime
  displayName: String
  followPolicy: ProfileFollowPolicy
  handle: String
  id: ID!
}

type ProfileFollow implements Node {
  createdAt: DateTime
  id: ID!
  state: ProfileFollowState
}

enum ProfileFollowPolicy {
  APPROVAL_REQUIRED
  OPEN
}

enum ProfileFollowState {
  ACCEPTED
  PENDING
  REJECTED
}

enum ProfileState {
  ACTIVE
  DISABLED
  SUSPENDED
}

type Query {
  me: Account
  node(id: ID!): Node
  nodes(ids: [ID!]!): [Node]!
  profileByHandle(handle: String!): Profile
}
