{{- if eq .Values.env "dev" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ printf "%s-db-migrate" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    helm.sh/chart: {{ include "kosmo.chart" . }}
    app.kubernetes.io/name: db-migrate
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.version | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
spec:
  activeDeadlineSeconds: 600
  backoffLimit: 0
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: db-migrate
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      containers:
        - name: db-migrate
          image: {{ printf "%s:%s" .Values.image .Values.version | quote }}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          args:
            - migrate
          env:
            {{- if not (and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled) }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-app" (include "kosmo.postgresName" .) | quote }}
                  key: password
            {{- end }}
            - name: DATABASE_URL
              value: {{ include "kosmo.databaseUrl" (dict "root" . "workload" "migration") | quote }}
            {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
            - name: PGSSLCERT
              value: /var/run/secrets/postgres/tls.crt
            - name: PGSSLKEY
              value: /var/run/secrets/postgres/tls.key
            - name: PGSSLROOTCERT
              value: /var/run/secrets/postgres/ca.crt
            {{- end }}
          {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
          volumeMounts:
            - name: postgres-tls
              mountPath: /var/run/secrets/postgres
              readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
      volumes:
        - name: postgres-tls
          secret:
            secretName: {{ include "kosmo.postgresClientTlsName" (dict "root" . "workload" "migration") | quote }}
      {{- end }}
{{- end }}
