apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ include "kosmo.postgresName" . }}
  labels:
    helm.sh/chart: {{ include "kosmo.chart" . }}
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  instances: 1
{{- if eq .Values.env "dev" }}
  enablePDB: false
{{- end }}
  bootstrap:
    initdb:
      database: kosmo
      owner: kosmo
{{- if .Values.postgresTls.enabled }}
  certificates:
    clientCASecret: {{ include "kosmo.postgresServerTlsName" . }}
    replicationTLSSecret: {{ include "kosmo.postgresClientTlsName" (dict "root" . "workload" "replication") }}
    serverCASecret: {{ include "kosmo.postgresServerTlsName" . }}
    serverTLSSecret: {{ include "kosmo.postgresServerTlsName" . }}
  postgresql:
    pg_hba:
{{- range $identity := list "runtime" "migration" }}
{{- $connection := index $.Values.postgresTls $identity }}
      - {{ printf "hostssl %s %s all cert" (required (printf "postgresTls.%s.database is required when postgresTls is enabled" $identity) $connection.database) (required (printf "postgresTls.%s.role is required when postgresTls is enabled" $identity) $connection.role) | quote }}
{{- end }}
{{- end }}
  storage:
    size: 10Gi
