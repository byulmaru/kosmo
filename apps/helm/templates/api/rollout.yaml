apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ printf "%s-api" .Release.Name | trunc 63 | trimSuffix "-" }}
  labels:
    helm.sh/chart: {{ include "kosmo.chart" . }}
    app.kubernetes.io/name: api
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/version: {{ .Values.version | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  strategy:
    blueGreen:
      activeService: {{ printf "%s-api" .Release.Name | trunc 63 | trimSuffix "-" }}
      previewService: {{ printf "%s-api-preview" .Release.Name | trunc 63 | trimSuffix "-" }}
      autoPromotionEnabled: true
      previewReplicaCount: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: api
          image: {{ printf "%s:%s" .Values.image .Values.version | quote }}
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          args:
            - api
          env:
            {{- if not (and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled) }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-app" (include "kosmo.postgresName" .) | quote }}
                  key: password
            {{- end }}
            - name: DATABASE_URL
              value: {{ include "kosmo.databaseUrl" (dict "root" . "workload" "api") | quote }}
            {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
            - name: PGSSLCERT
              value: /var/run/secrets/postgres/tls.crt
            - name: PGSSLKEY
              value: /var/run/secrets/postgres/tls.key
            - name: PGSSLROOTCERT
              value: /var/run/secrets/postgres/ca.crt
            {{- end }}
          envFrom:
            - secretRef:
                name: env
          {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
          volumeMounts:
            - name: postgres-tls
              mountPath: /var/run/secrets/postgres
              readOnly: true
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      {{- if and .Values.postgresTls.enabled .Values.postgresTls.clientAuthEnabled }}
      volumes:
        - name: postgres-tls
          secret:
            secretName: {{ include "kosmo.postgresClientTlsName" (dict "root" . "workload" "api") | quote }}
      {{- end }}
