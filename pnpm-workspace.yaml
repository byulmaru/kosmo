packages:
  - apps/*
  - packages/*

enableGlobalVirtualStore: false
pmOnFail: ignore
minimumReleaseAge: 4320
allowBuilds:
  '@fission-ai/openspec': true
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - cookie@0.7.0
  - esbuild
  - '@esbuild/*'
overrides:
  cookie@<0.7.0: ^0.7.0
  esbuild@<0.28.1: ^0.28.1
