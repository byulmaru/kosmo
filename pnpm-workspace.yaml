packages:
  - apps/*
  - packages/*

enableGlobalVirtualStore: true
pmOnFail: ignore
minimumReleaseAge: 4320
packageExtensions:
  '@mearie/codegen@0.1.7':
    dependencies:
      svelte: '*'
allowBuilds:
  '@fission-ai/openspec': true
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
  unrs-resolver: true
