packages:
  - apps/*
  - packages/*

enableGlobalVirtualStore: false
confirmModulesPurge: false
pmOnFail: ignore
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive entries still pinned by upstream packages; keep exceptions version-pinned.
  - chokidar@4.0.3
  - semver@6.3.1
minimumReleaseAge: 10080
allowBuilds:
  '@fission-ai/openspec': true
  esbuild: true
  unrs-resolver: true
overrides:
  '@opentelemetry/sdk-metrics@<2.8.0': ^2.8.0
  cookie@<0.7.0: ^0.7.0
  esbuild@<0.28.1: ^0.28.1
  # react-native-web and Relay import only areEqual, invariant, and warning
  # from fbjs. Use the audited local surface instead of fbjs' ua-parser chain.
  fbjs: link:./packages/fbjs-shim
