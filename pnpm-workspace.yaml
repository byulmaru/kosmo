packages:
  - apps/*
  - packages/*

enableGlobalVirtualStore: false
pmOnFail: ignore
blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyExclude:
  # Transitive entries still pinned by upstream packages; keep exceptions version-pinned.
  - chokidar@4.0.3
  - semver@6.3.1
minimumReleaseAge: 10080
allowBuilds:
  '@fission-ai/openspec': true
  '@tailwindcss/oxide': true
  core-js: true
  esbuild: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - esbuild@0.28.1
  - '@esbuild/aix-ppc64@0.28.1'
  - '@esbuild/android-arm@0.28.1'
  - '@esbuild/android-arm64@0.28.1'
  - '@esbuild/android-x64@0.28.1'
  - '@esbuild/darwin-arm64@0.28.1'
  - '@esbuild/darwin-x64@0.28.1'
  - '@esbuild/freebsd-arm64@0.28.1'
  - '@esbuild/freebsd-x64@0.28.1'
  - '@esbuild/linux-arm@0.28.1'
  - '@esbuild/linux-arm64@0.28.1'
  - '@esbuild/linux-ia32@0.28.1'
  - '@esbuild/linux-loong64@0.28.1'
  - '@esbuild/linux-mips64el@0.28.1'
  - '@esbuild/linux-ppc64@0.28.1'
  - '@esbuild/linux-riscv64@0.28.1'
  - '@esbuild/linux-s390x@0.28.1'
  - '@esbuild/linux-x64@0.28.1'
  - '@esbuild/netbsd-arm64@0.28.1'
  - '@esbuild/netbsd-x64@0.28.1'
  - '@esbuild/openbsd-arm64@0.28.1'
  - '@esbuild/openbsd-x64@0.28.1'
  - '@esbuild/openharmony-arm64@0.28.1'
  - '@esbuild/sunos-x64@0.28.1'
  - '@esbuild/win32-arm64@0.28.1'
  - '@esbuild/win32-ia32@0.28.1'
  - '@esbuild/win32-x64@0.28.1'
  - ws@8.21.0
  - hono@4.12.25
overrides:
  '@opentelemetry/sdk-metrics@<2.8.0': ^2.8.0
  # Expo Router exposes broad native peers; align every peer snapshot with SDK 56 / RN 0.85.
  '@react-native/metro-config': 0.85.3
  cookie@<0.7.0: ^0.7.0
  esbuild@<0.28.1: ^0.28.1
  # Keep fbjs's declared parser without crossing into the later provenance-downgrade releases.
  'fbjs@3.0.5>ua-parser-js': 1.0.39
  react-native-reanimated: 4.3.1
  react-native-worklets: 0.8.3

patchedDependencies:
  '@fedify/vocab-runtime@2.3.0': patches/@fedify__vocab-runtime@2.3.0.patch
  '@fedify/vocab@2.3.0': patches/@fedify__vocab@2.3.0.patch
  '@fedify/webfinger@2.3.0': patches/@fedify__webfinger@2.3.0.patch
