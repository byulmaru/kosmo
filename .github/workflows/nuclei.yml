name: Nuclei

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Target URLs, one URL per line
        required: false
        type: string
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.targets || github.ref }}
  cancel-in-progress: true

jobs:
  nuclei:
    name: Nuclei scan
    runs-on: [self-hosted]
    env:
      DEFAULT_TARGETS: |
        https://kos.moe
        https://api.kos.moe
      # Cloudflare controls the edge cipher suites, which cannot be changed on the current plan.
      NUCLEI_ARGS: >-
        -list nuclei-targets.txt
        -jle nuclei.jsonl
        -severity low,medium,high,critical
        -exclude-id weak-cipher-suites
        -stats
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Prepare targets
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_TARGETS: ${{ inputs.targets }}
        with:
          script: |
            const fs = require("fs");

            const targets = (process.env.INPUT_TARGETS || process.env.DEFAULT_TARGETS || "")
              .split(/\r?\n/)
              .map((target) => target.trim())
              .filter(Boolean);

            if (targets.length === 0) {
              throw new Error("No Nuclei targets were provided.");
            }

            fs.writeFileSync("nuclei-targets.txt", `${targets.join("\n")}\n`);
            core.info(`Prepared ${targets.length} Nuclei target(s).`);

      - name: Run Nuclei
        id: nuclei
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@cc153d0541e1adf8a42bbe31c0a4fb2376147538 # v3.1.1
        with:
          args: ${{ env.NUCLEI_ARGS }}

      - name: Upload Nuclei artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: nuclei-report
          path: |
            nuclei-targets.txt
            nuclei.jsonl
          if-no-files-found: warn
          retention-days: 7

      - name: Report Nuclei findings
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          NUCLEI_STATUS: ${{ steps.nuclei.outcome }}
        with:
          script: |
            const fs = require("fs");

            const reportPath = "nuclei.jsonl";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const targets = fs.existsSync("nuclei-targets.txt")
              ? fs.readFileSync("nuclei-targets.txt", "utf8").split(/\r?\n/).filter(Boolean)
              : [];
            const status = process.env.NUCLEI_STATUS;

            const findings = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, "utf8")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .flatMap((line) => {
                  try {
                    return [JSON.parse(line)];
                  } catch (error) {
                    core.warning(`Skipping non-JSON Nuclei output line: ${line}`);
                    return [];
                  }
                })
              : [];

            const counts = findings.reduce((acc, finding) => {
              const severity = finding.info?.severity ?? finding.severity ?? "unknown";
              acc[severity] = (acc[severity] ?? 0) + 1;
              return acc;
            }, {});

            const topFindings = findings.slice(0, 10).map((finding, index) => {
              const severity = finding.info?.severity ?? finding.severity ?? "unknown";
              const name = finding.info?.name ?? finding["template-id"] ?? "unknown template";
              const matched = finding["matched-at"] ?? finding.host ?? finding.url ?? "unknown target";
              return `${index + 1}. [${severity}] ${name} - ${matched}`;
            });

            const omitted = findings.length > topFindings.length
              ? `\n...and ${findings.length - topFindings.length} more finding(s).`
              : "";

            const summary = [
              "## Nuclei scan",
              "",
              `Targets: ${targets.map((target) => `\`${target}\``).join(", ") || "none"}`,
              `Status: \`${status}\``,
              "",
              "| Severity | Count |",
              "| --- | ---: |",
              `| Critical | ${counts.critical ?? 0} |`,
              `| High | ${counts.high ?? 0} |`,
              `| Medium | ${counts.medium ?? 0} |`,
              `| Low | ${counts.low ?? 0} |`,
              `| Info | ${counts.info ?? 0} |`,
              "",
              "### Findings",
              "",
              findings.length > 0
                ? topFindings.join("\n") + omitted
                : status === "failure"
                  ? "The Nuclei scan failed before producing findings."
                  : "No findings were detected.",
              "",
              `Full report: [nuclei-report artifact](${runUrl})`,
            ].join("\n");

            await core.summary.addRaw(summary).write();

            if (!process.env.SLACK_WEBHOOK_URL || (findings.length === 0 && status !== "failure")) {
              return;
            }

            const payload = {
              text: [
                "*Nuclei issue detected*",
                `Repository: \`${context.repo.owner}/${context.repo.repo}\``,
                `Event: \`${context.eventName}\``,
                `Targets: ${targets.map((target) => `\`${target}\``).join(", ")}`,
                `Status: \`${status}\``,
                `Findings: critical ${counts.critical ?? 0}, high ${counts.high ?? 0}, medium ${counts.medium ?? 0}, low ${counts.low ?? 0}, info ${counts.info ?? 0}`,
                "",
                topFindings.length > 0 ? topFindings.join("\n") + omitted : "The Nuclei scan failed before producing findings.",
                "",
                `Run: ${runUrl}`,
              ].join("\n"),
            };

            const response = await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Slack notification failed: ${response.status} ${await response.text()}`);
            }

      - name: Fail when Nuclei execution failed
        if: steps.nuclei.outcome == 'failure'
        run: exit 1
