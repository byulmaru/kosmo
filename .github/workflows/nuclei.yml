name: Nuclei

on:
  workflow_dispatch:
    inputs:
      targets:
        description: Target URLs, one URL per line
        required: false
        type: string
  schedule:
    - cron: '0 20 * * *'

permissions:
  contents: read

jobs:
  nuclei:
    name: Nuclei scan
    runs-on: ubuntu-latest
    env:
      DEFAULT_TARGETS: |
        https://kos.moe
        https://api.kos.moe
      NUCLEI_FLAGS: >-
        -severity low,medium,high,critical
        -stats
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare targets
        uses: actions/github-script@v7
        env:
          INPUT_TARGETS: ${{ inputs.targets }}
        with:
          script: |
            const fs = require("fs");

            const targets = (process.env.INPUT_TARGETS || process.env.DEFAULT_TARGETS || "")
              .split(/\r?\n/)
              .map((target) => target.trim())
              .filter(Boolean);

            if (targets.length === 0) {
              throw new Error("No Nuclei targets were provided.");
            }

            fs.writeFileSync("nuclei-targets.txt", `${targets.join("\n")}\n`);
            core.info(`Prepared ${targets.length} Nuclei target(s).`);

      - name: Run Nuclei
        id: nuclei
        continue-on-error: true
        uses: projectdiscovery/nuclei-action@main
        with:
          urls: nuclei-targets.txt
          output: nuclei.jsonl
          json: true
          flags: ${{ env.NUCLEI_FLAGS }}

      - name: Upload Nuclei artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nuclei-report
          path: |
            nuclei-targets.txt
            nuclei.jsonl
          if-no-files-found: warn

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            const reportPath = "nuclei.jsonl";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const targets = fs.existsSync("nuclei-targets.txt")
              ? fs.readFileSync("nuclei-targets.txt", "utf8").split(/\r?\n/).filter(Boolean)
              : [];
            const status = "${{ steps.nuclei.outcome }}";

            const findings = fs.existsSync(reportPath)
              ? fs.readFileSync(reportPath, "utf8")
                .split(/\r?\n/)
                .map((line) => line.trim())
                .filter(Boolean)
                .flatMap((line) => {
                  try {
                    return [JSON.parse(line)];
                  } catch (error) {
                    core.warning(`Skipping non-JSON Nuclei output line: ${line}`);
                    return [];
                  }
                })
              : [];

            if (findings.length === 0 && status !== "failure") {
              core.info("No Nuclei findings detected. Skipping Slack notification.");
              return;
            }

            const counts = findings.reduce((acc, finding) => {
              const severity = finding.info?.severity ?? finding.severity ?? "unknown";
              acc[severity] = (acc[severity] ?? 0) + 1;
              return acc;
            }, {});

            const topFindings = findings.slice(0, 10).map((finding, index) => {
              const severity = finding.info?.severity ?? finding.severity ?? "unknown";
              const name = finding.info?.name ?? finding["template-id"] ?? "unknown template";
              const matched = finding["matched-at"] ?? finding.host ?? finding.url ?? "unknown target";
              return `${index + 1}. [${severity}] ${name} - ${matched}`;
            });

            const omitted = findings.length > topFindings.length
              ? `\n...and ${findings.length - topFindings.length} more finding(s).`
              : "";

            const payload = {
              text: [
                "*Nuclei issue detected*",
                `Repository: \`${context.repo.owner}/${context.repo.repo}\``,
                `Event: \`${context.eventName}\``,
                `Targets: ${targets.map((target) => `\`${target}\``).join(", ")}`,
                `Status: \`${status}\``,
                `Findings: critical ${counts.critical ?? 0}, high ${counts.high ?? 0}, medium ${counts.medium ?? 0}, low ${counts.low ?? 0}, info ${counts.info ?? 0}`,
                "",
                topFindings.length > 0 ? topFindings.join("\n") + omitted : "The Nuclei scan failed before producing findings.",
                "",
                `Run: ${runUrl}`,
              ].join("\n"),
            };

            const response = await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Slack notification failed: ${response.status} ${await response.text()}`);
            }

      - name: Fail when Nuclei execution failed
        if: steps.nuclei.outcome == 'failure'
        run: exit 1
