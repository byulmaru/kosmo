name: Web E2E

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-e2e
  cancel-in-progress: false

jobs:
  web_e2e:
    name: Web E2E
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run app and web unit tests
        run: |
          pnpm --filter @kosmo/app test:unit
          pnpm --filter @kosmo/web test:unit

      - name: Check web TypeScript
        run: pnpm --filter @kosmo/web check

      - name: Install Playwright Chromium
        run: pnpm --filter @kosmo/app exec playwright install chromium

      - name: Build and test the app Storybook
        run: |
          pnpm --filter @kosmo/app build-storybook
          pnpm --filter @kosmo/app test:storybook

      - name: Run Fedify unit tests
        run: |
          pnpm db:test:reset
          pnpm db:test:push
          pnpm test:fedify

      - name: Run web E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean up test Postgres
        if: always()
        run: node scripts/test-db.mjs down --volumes --remove-orphans
