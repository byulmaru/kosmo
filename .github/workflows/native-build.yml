name: Native Build

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  native_build:
    name: Native Build
    runs-on: [self-hosted, macOS]
    env:
      CI: 1
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Ensure generated projects remain untracked
        run: |
          if git ls-files apps/app/android apps/app/ios | grep -q .; then
            echo "::error::Generated native projects must remain untracked."
            exit 1
          fi

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: 17

      - name: Set up CocoaPods
        run: command -v pod >/dev/null || brew install cocoapods

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate clean native projects
        working-directory: apps/app
        run: pnpm exec expo prebuild --clean

      - name: Build Android debug app
        working-directory: apps/app/android
        run: ./gradlew --no-daemon assembleDebug

      - name: Build iOS simulator app
        working-directory: apps/app
        run: >-
          xcodebuild
          -workspace ios/Kosmo.xcworkspace
          -scheme Kosmo
          -configuration Debug
          -sdk iphonesimulator
          -destination 'generic/platform=iOS Simulator'
          -derivedDataPath ios/DerivedData
          CODE_SIGNING_ALLOWED=NO
          build
