name: Terraform

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/terraform.yml
      - apps/terraform/**
  push:
    branches:
      - main
    paths:
      - .github/workflows/terraform.yml
      - apps/terraform/**

permissions:
  actions: read
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: terraform-kosmo-state
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  TF_IN_AUTOMATION: 'true'
  TF_PLAN_ARTIFACT: terraform-plan
  TF_ROOT: apps/terraform
  TF_STATE_BUCKET: byulmaru-terraform-state
  TF_STATE_KEY: kosmo/firebase.tfstate

jobs:
  plan:
    name: Terraform Plan
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: byulmaru-kosmo
          workload_identity_provider: ${{ vars.GCP_TERRAFORM_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          cleanup_credentials: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.6'

      - name: Terraform init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_ROOT }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_ROOT }}
        run: terraform plan -input=false -out=terraform.tfplan

      - name: Render Terraform plan
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail

          terraform show -no-color terraform.tfplan > terraform.tfplan.txt
          {
            echo "TF_PLAN_TREE_SHA=$(git -C ../.. rev-parse 'HEAD^{tree}')"
            echo "TF_PLAN_PR_NUMBER=${{ github.event.pull_request.number }}"
            echo "TF_PLAN_HEAD_SHA=${{ github.event.pull_request.head.sha }}"
          } > plan.env

          plan_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          total_lines="$(wc -l < terraform.tfplan.txt)"
          {
            echo "## Terraform plan"
            echo
            echo "- Commit: \`${{ github.event.pull_request.head.sha }}\`"
            echo "- Workflow run: [${GITHUB_RUN_ID}](${plan_url})"
            echo "- Apply: merge this PR to \`main\`"
            echo
            echo "<details>"
            echo "<summary>terraform show -no-color terraform.tfplan</summary>"
            echo
            echo '```terraform'
            sed -n '1,600p' terraform.tfplan.txt
            if [[ "${total_lines}" -gt 600 ]]; then
              echo "... truncated; download the artifact for the full plan ..."
            fi
            echo '```'
            echo "</details>"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment Terraform plan on pull request
        continue-on-error: true
        working-directory: ${{ env.TF_ROOT }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          current_head_sha="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '.head.sha')"
          if [[ "${current_head_sha}" != "${PR_HEAD_SHA}" ]]; then
            echo "Skipping comment for outdated PR head ${PR_HEAD_SHA}."
            exit 0
          fi

          marker="<!-- terraform-plan-comment -->"
          plan_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          head -c 45000 terraform.tfplan.txt > terraform.tfplan-excerpt.txt
          if [[ "$(wc -c < terraform.tfplan.txt)" -gt 45000 ]]; then
            echo "... truncated; open the workflow summary or artifact ..." >> terraform.tfplan-excerpt.txt
          fi

          {
            echo "${marker}"
            echo "## Terraform plan"
            echo
            echo "- Commit: \`${PR_HEAD_SHA}\`"
            echo "- Workflow run: [${GITHUB_RUN_ID}](${plan_url})"
            echo "- Apply: merge this PR to \`main\`"
            echo
            echo "<details open>"
            echo "<summary>terraform show -no-color terraform.tfplan</summary>"
            echo
            echo '```terraform'
            cat terraform.tfplan-excerpt.txt
            echo '```'
            echo "</details>"
          } > terraform-pr-comment.md

          comment_id="$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.user.type == \"Bot\" and (.body | contains(\"${marker}\"))) | .id" \
            | head -n 1)"

          if [[ -n "${comment_id}" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -F body=@terraform-pr-comment.md
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -F body=@terraform-pr-comment.md
          fi

      - name: Save Terraform plan
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.TF_PLAN_ARTIFACT }}
          path: |
            apps/terraform/terraform.tfplan
            apps/terraform/terraform.tfplan.txt
            apps/terraform/plan.env
          if-no-files-found: error
          retention-days: 3

  apply:
    name: Terraform Apply
    if: ${{ github.event_name == 'push' }}
    runs-on: self-hosted
    environment: terraform-apply

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          project_id: byulmaru-kosmo
          workload_identity_provider: ${{ vars.GCP_TERRAFORM_PROVIDER }}
          service_account: ${{ vars.GCP_TERRAFORM_SERVICE_ACCOUNT }}
          create_credentials_file: true
          export_environment_variables: true
          cleanup_credentials: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: '1.15.6'

      - name: Setup AWS CLI
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          cache: false
          tool_versions: |
            aws-cli 2.35.14

      - name: Terraform init
        working-directory: ${{ env.TF_ROOT }}
        run: terraform init

      - name: Download merged pull request plan
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          pr_api="repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls"
          pr_jq='(map(select(.merged_at != null)) | sort_by(.number) | last // empty)'
          pr_number="$(gh api -H "Accept: application/vnd.github+json" "${pr_api}" --jq "${pr_jq} | .number // empty")"
          pr_head_sha="$(gh api -H "Accept: application/vnd.github+json" "${pr_api}" --jq "${pr_jq} | .head.sha // empty")"
          pr_url="$(gh api -H "Accept: application/vnd.github+json" "${pr_api}" --jq "${pr_jq} | .html_url // empty")"

          if [[ -z "${pr_number}" || -z "${pr_head_sha}" ]]; then
            echo "No merged pull request is associated with ${GITHUB_SHA}; refusing to apply an unreviewed plan." >&2
            exit 1
          fi

          plan_run_id="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/terraform.yml/runs?event=pull_request&status=success&per_page=100" \
            --jq ".workflow_runs | sort_by(.run_started_at) | reverse | .[] | select(.head_sha == \"${pr_head_sha}\") | .id" \
            | head -n 1)"
          if [[ -z "${plan_run_id}" ]]; then
            echo "No successful Terraform plan found for PR #${pr_number} at ${pr_head_sha}." >&2
            exit 1
          fi

          gh run download "${plan_run_id}" --name "${TF_PLAN_ARTIFACT}" --dir "${TF_ROOT}"

          plan_env() {
            awk -F= -v key="$1" '$1 == key { print substr($0, length(key) + 2); exit }' "${TF_ROOT}/plan.env"
          }

          planned_tree_sha="$(plan_env TF_PLAN_TREE_SHA)"
          current_tree_sha="$(git rev-parse 'HEAD^{tree}')"
          planned_pr_number="$(plan_env TF_PLAN_PR_NUMBER)"
          planned_head_sha="$(plan_env TF_PLAN_HEAD_SHA)"

          if [[ "${planned_tree_sha}" != "${current_tree_sha}" ]]; then
            echo "Downloaded plan was created for a different repository tree." >&2
            exit 1
          fi
          if [[ "${planned_pr_number}" != "${pr_number}" || "${planned_head_sha}" != "${pr_head_sha}" ]]; then
            echo "Downloaded plan metadata does not match PR #${pr_number} at ${pr_head_sha}." >&2
            exit 1
          fi

          {
            echo "TF_PLAN_SOURCE_PR=${pr_number}"
            echo "TF_PLAN_SOURCE_RUN_ID=${plan_run_id}"
            echo "TF_PLAN_SOURCE_URL=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${plan_run_id}"
            echo "TF_PLAN_SOURCE_PR_URL=${pr_url}"
          } >> "${GITHUB_ENV}"

      - name: Summarize Terraform apply
        run: |
          {
            echo "## Terraform apply"
            echo
            echo "Applying the saved plan from PR [#${TF_PLAN_SOURCE_PR}](${TF_PLAN_SOURCE_PR_URL})."
            echo "- Plan workflow run: [${TF_PLAN_SOURCE_RUN_ID}](${TF_PLAN_SOURCE_URL})"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Terraform apply saved plan
        working-directory: ${{ env.TF_ROOT }}
        run: |
          set -euo pipefail

          cleanup_lock_on_cancel() {
            status=$?
            if [[ -n "${terraform_pid:-}" ]]; then
              kill -INT "${terraform_pid}" 2>/dev/null || true
              wait "${terraform_pid}" 2>/dev/null || true
            fi
            sleep 5
            aws s3api delete-object \
              --bucket "${TF_STATE_BUCKET}" \
              --key "${TF_STATE_KEY}.tflock" || true
            exit "${status}"
          }

          trap cleanup_lock_on_cancel INT TERM
          terraform apply -auto-approve terraform.tfplan &
          terraform_pid=$!
          wait "${terraform_pid}"

      - name: Cleanup lock after cancelled apply
        if: ${{ cancelled() }}
        run: |
          aws s3api delete-object \
            --bucket "${TF_STATE_BUCKET}" \
            --key "${TF_STATE_KEY}.tflock"
