name: Lint

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: arc-b-4x
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run lint for workspace root
        run: bun run --parallel "lint:*"

      - name: Run lint for apps
        run: bun run --parallel --workspaces "lint:*"
