name: Lint

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint for workspace root
        run: pnpm run "/^lint:.*/"

      - name: Run lint for apps
        run: pnpm --recursive --parallel --if-present run "/^lint:.*/"
