name: Test

on:
  pull_request:
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit_test:
    name: Unit Test
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:unit

  typescript:
    name: TypeScript
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check TypeScript
        run: pnpm check

  storybook:
    name: Storybook
    runs-on: [self-hosted]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @kosmo/app exec playwright install chromium

      - name: Build and test the app Storybook
        run: pnpm test:storybook

  fedify:
    name: Fedify
    runs-on: [self-hosted]
    env:
      DATABASE_URL: >-
        postgres://kosmo:kosmo@localhost:54329/kosmo_test_${{ github.run_id }}_${{ github.run_attempt }}_fedify
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Fedify unit tests
        run: pnpm test:fedify

      - name: Clean up test database
        if: always()
        run: pnpm db:test:drop

  web_e2e:
    name: Web E2E
    runs-on: [self-hosted]
    env:
      DATABASE_URL: >-
        postgres://kosmo:kosmo@localhost:54329/kosmo_test_${{ github.run_id }}_${{ github.run_attempt }}_web_e2e
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm --filter @kosmo/app exec playwright install chromium

      - name: Run web E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean up test database
        if: always()
        run: pnpm db:test:drop
