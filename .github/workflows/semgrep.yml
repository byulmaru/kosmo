name: Semgrep

on:
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  SEMGREP_CONFIGS: >-
    --config=p/default
    --config=p/javascript
    --config=p/typescript
    --config=p/secrets

jobs:
  semgrep:
    name: Semgrep scan
    runs-on: [self-hosted]
    if: github.actor != 'dependabot[bot]'
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          cache: false
          mise_toml: |
            [tools]
            python = "3.12"

      - name: Install Semgrep
        run: python -m pip install --upgrade semgrep

      - name: Run Semgrep
        id: semgrep
        continue-on-error: true
        run: |
          # shellcheck disable=SC2086
          semgrep scan \
            $SEMGREP_CONFIGS \
            --json \
            --output=semgrep.json

      - name: Upload Semgrep report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: semgrep-report
          path: semgrep.json
          if-no-files-found: error
          retention-days: 7

      - name: Report Semgrep findings
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");

            const reportPath = "semgrep.json";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const hasReport = fs.existsSync(reportPath);
            let results = [];
            if (hasReport) {
              const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              results = report.results ?? [];
            }

            const severityOrder = { ERROR: 0, WARNING: 1, INFO: 2 };
            results.sort((a, b) => {
              const severityA = severityOrder[a.extra?.severity] ?? 99;
              const severityB = severityOrder[b.extra?.severity] ?? 99;
              return severityA - severityB
                || String(a.path).localeCompare(String(b.path))
                || Number(a.start?.line ?? 0) - Number(b.start?.line ?? 0);
            });

            const counts = results.reduce((acc, result) => {
              const severity = result.extra?.severity ?? "UNKNOWN";
              acc[severity] = (acc[severity] ?? 0) + 1;
              return acc;
            }, {});

            const summary = [
              ["Severity", "Count"],
              ["ERROR", String(counts.ERROR ?? 0)],
              ["WARNING", String(counts.WARNING ?? 0)],
              ["INFO", String(counts.INFO ?? 0)],
            ];

            const annotationCounts = { ERROR: 0, WARNING: 0, INFO: 0 };
            for (const result of results) {
              const severity = result.extra?.severity ?? "INFO";
              const path = result.path;
              const line = Number(result.start?.line);
              if (!path || !Number.isInteger(line) || (annotationCounts[severity] ?? 10) >= 10) {
                continue;
              }

              const rule = result.check_id ?? "Semgrep finding";
              const message = (result.extra?.message ?? rule).replace(/\s+/g, " ").trim();
              const properties = { file: path, startLine: line, title: rule };
              if (severity === "ERROR") {
                core.error(message, properties);
              } else if (severity === "WARNING") {
                core.warning(message, properties);
              } else {
                core.notice(message, properties);
              }
              annotationCounts[severity] += 1;
            }

            const maxFindings = 30;
            const findingLines = results.slice(0, maxFindings).map((result, index) => {
              const path = result.path ?? "(unknown path)";
              const line = result.start?.line ?? "?";
              const severity = result.extra?.severity ?? "UNKNOWN";
              const rule = result.check_id ?? "(unknown rule)";
              const message = (result.extra?.message ?? "").replace(/\s+/g, " ").trim();
              const sha = context.payload.pull_request?.head?.sha ?? context.sha;
              return `${index + 1}. \`${severity}\` [${path}:${line}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${sha}/${path}#L${line}) - \`${rule}\`${message ? `\n   ${message}` : ""}`;
            });

            const truncated = results.length > maxFindings
              ? `\n\n${results.length - maxFindings} findings were omitted. Check the artifact for the full report.`
              : "";

            const body = [
              "## Semgrep security scan",
              "",
              `Status: \`${{ steps.semgrep.outcome }}\``,
              "",
              "### Summary",
              "",
              "| Severity | Count |",
              "| --- | ---: |",
              ...summary.slice(1).map(([severity, count]) => `| ${severity} | ${count} |`),
              "",
              "### Findings",
              "",
              !hasReport
                ? "No Semgrep report was produced."
                : results.length > 0
                  ? findingLines.join("\n") + truncated
                  : "No findings were detected.",
              "",
              `Full report: [semgrep-report artifact](${runUrl})`,
            ].join("\n");

            await core.summary.addRaw(body).write();

      - name: Notify Slack
        if: always() && env.SLACK_WEBHOOK_URL != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("fs");

            const reportPath = "semgrep.json";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let results = [];

            if (fs.existsSync(reportPath)) {
              const report = JSON.parse(fs.readFileSync(reportPath, "utf8"));
              results = report.results ?? [];
            }

            if (results.length === 0) {
              core.info("No Semgrep findings detected. Skipping Slack notification.");
              return;
            }

            const counts = results.reduce((acc, result) => {
              const severity = result.extra?.severity ?? "UNKNOWN";
              acc[severity] = (acc[severity] ?? 0) + 1;
              return acc;
            }, {});

            const status = "${{ steps.semgrep.outcome }}";
            const pr = context.payload.pull_request;
            const prLine = pr ? `PR: #${pr.number} ${pr.html_url}` : null;

            const payload = {
              text: [
                "*Semgrep issue detected*",
                `Repository: \`${context.repo.owner}/${context.repo.repo}\``,
                `Event: \`${context.eventName}\``,
                prLine,
                `Branch/Ref: \`${context.payload.pull_request?.head?.ref ?? context.ref.replace("refs/heads/", "")}\``,
                `Status: \`${status}\``,
                `ERROR: ${counts.ERROR ?? 0}, WARNING: ${counts.WARNING ?? 0}, INFO: ${counts.INFO ?? 0}`,
                `Run: ${runUrl}`,
              ].filter(Boolean).join("\n"),
            };

            const response = await fetch(process.env.SLACK_WEBHOOK_URL, {
              method: "POST",
              headers: { "content-type": "application/json" },
              body: JSON.stringify(payload),
            });

            if (!response.ok) {
              throw new Error(`Slack notification failed: ${response.status} ${await response.text()}`);
            }

      - name: Fail when Semgrep execution failed
        if: steps.semgrep.outcome == 'failure'
        run: exit 1
