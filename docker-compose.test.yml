services:
  postgres:
    image: postgres:17-alpine
    ports:
      - '${POSTGRES_PORT:-54329}:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kosmo_test}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kosmo}
      POSTGRES_USER: ${POSTGRES_USER:-kosmo}
    command:
      - postgres
      - -c
      - fsync=off
      - -c
      - full_page_writes=off
      - -c
      - synchronous_commit=off
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
